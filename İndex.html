<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RODEX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#f0f0f0;color:#1a1a1a;height:100vh;width:100vw}
.phone-frame{width:100%;height:100vh;max-width:430px;margin:0 auto;background:#fff;display:flex;flex-direction:column;position:relative;overflow:hidden}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px 4px;font-size:14px;font-weight:600;color:#1a1a1a;background:#fff}
.status-bar .brand{font-size:11px;font-weight:800;color:#22d3ee;letter-spacing:2px}
.app-header{padding:8px 20px 14px;background:#fff;z-index:10;border-bottom:1px solid #f0f0f0}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:#22d3ee;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}
.logo h1{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid #22d3ee}
.avatar img{width:100%;height:100%;object-fit:cover}
.content-area{flex:1;overflow-y:auto;position:relative;background:#fff}
.page{display:none;padding:0 20px 100px}
.page.active{display:block}
.profile-header{display:flex;flex-direction:column;align-items:center;padding:20px 0 24px}
.profile-avatar-lg{position:relative;width:100px;height:100px;border-radius:50%;overflow:hidden;border:3px solid #22d3ee;margin-bottom:14px}
.profile-avatar-lg img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:22px;font-weight:700;margin-bottom:2px}
.profile-handle{font-size:13px;color:#22d3ee;font-weight:600;margin-bottom:8px}
.profile-bio{font-size:13px;color:#666;text-align:center;margin-bottom:16px;line-height:1.4}
.profile-stats-row{display:flex;gap:24px;margin-bottom:16px}
.p-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.p-number{font-size:18px;font-weight:700}
.p-label{font-size:12px;color:#8e8e93}
.profile-buttons{display:flex;gap:10px;width:100%}
.btn-main{flex:1;background:#1a1a1a;color:#fff;border:none;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.bottom-nav{display:flex;justify-content:space-around;align-items:center;background:#fff;padding:8px 0 20px;border-top:1px solid #f0f0f0;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:#8e8e93;cursor:pointer;padding:4px 8px;font-family:inherit}
.nav-item.active{color:#22d3ee}
</style>
</head>
<body>
<div class="phone-frame">
<div class="status-bar"><span>09:41</span><div class="brand">RODEX</div><div>🔔</div></div>
<div class="app-header"><div class="header-top"><div class="logo"><div class="logo-icon">R</div><h1>RODEX</h1></div><div class="avatar"><img src="https://i.imgur.com/Snl32E6.jpg" alt="Profil"></div></div></div>
<div class="content-area">
<div class="page active" id="page-home">
<div class="profile-header">
<div class="profile-avatar-lg"><img src="https://i.imgur.com/Snl32E6.jpg" alt=""></div>
<h2 class="profile-name">Enes Ateş</h2>
<p class="profile-handle">@enes.ates</p>
<p class="profile-bio">RODEX Kurucusu | Yazılımcı</p>
<div class="profile-stats-row">
<div class="p-stat"><span class="p-number">42</span><span class="p-label">Tarif</span></div>
<div class="p-stat"><span class="p-number">18</span><span class="p-label">E-Kitap</span></div>
<div class="p-stat"><span class="p-number">156</span><span class="p-label">Video</span></div>
<div class="p-stat"><span class="p-number">12.5K</span><span class="p-label">Takipçi</span></div>
</div>
<div class="profile-buttons"><button class="btn-main">Profili Düzenle</button></div>
</div>
</div>
</div>
<div class="bottom-nav">
<button class="nav-item active">🏠<span>Ana Sayfa</span></button>
<button class="nav-item">🍳<span>Tarifler</span></button>
<button class="nav-item">📚<span>E-Kitap</span></button>
<button class="nav-item">👤<span>Profil</span></button>
</div>
</div>
</body>
</html>
